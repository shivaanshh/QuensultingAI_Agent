# Render.com Blueprint — one-click deploy of the multi-tenant backend +
# frontend (marketing site + admin dashboard).
# Create a new "Blueprint" service, point it at this repo, and fill in the
# env vars marked `sync: false` in the Render dashboard (they hold secrets).
#
# Docker runtime: the build stage compiles frontend/ (Vite/React) and the
# Python image serves the result same-origin -- see the repo's Dockerfile.
# The start command (CMD in the Dockerfile) re-runs the idempotent tenant
# seed script on every boot so the dental tenant (and its webhook token)
# always exists.
#
# NOTE: the free plan's disk is ephemeral -- every redeploy starts from a
# fresh SQLite file. Booking history is lost on redeploy until DATABASE_URL
# points at a real Postgres instance (a config change only, no code change
# needed).
#
# Additional tenants (any of the 4 category templates) are onboarded either
# from the /admin dashboard or with
# `python scripts/create_tenant.py --category <key> ...` against this same
# deployment -- see README.md "Onboarding a new tenant".
services:
  - type: web
    name: quensulting-dental-voice-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # - key: DATABASE_URL          # uncomment once you have a Postgres URL
      #   sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_API_BASE
        value: https://api.retellai.com
      - key: BACKEND_BASE_URL        # set to this service's own Render URL
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON  # paste the whole service-account key here
        sync: false
      - key: BOOKINGS_WORKSHEET
        value: Bookings
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
